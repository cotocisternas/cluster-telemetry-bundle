tolerations: []
extraPorts:
  - port: 4318
    containerPort: 4318
    protocol: TCP
    name: otlp-http
extraVolumes:
  - name: flb-storage
    hostPath:
      path: /var/log/flb-storage
extraVolumeMounts:
  - name: flb-storage
    mountPath: /var/log/flb-storage
    readOnly: false
resources:
  requests:
    memory: 50Mi
  limits:
    memory: 64Mi
config:
  service: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020
        Parsers_File /fluent-bit/etc/parsers.conf
        storage.path             /var/log/flb-storage/
        storage.sync             normal
        storage.checksum         Off
        storage.max_chunks_up    24
        storage.total_limit_size  1G
  inputs: |
    [INPUT]
        Name             tail
        Tag              kube.*
        Path             /var/log/containers/*.log
        multiline.parser docker,cri
        DB               /var/log/flb_kube.db
        Skip_Long_Lines  On
        Refresh_Interval 10
        storage.type     filesystem
        storage.pause_on_chunks_overlimit On
    [INPUT]
        Name                    opentelemetry
        Tag                     otel.*
        Listen                  0.0.0.0
        Port                    4318
        Raw_Traces              On
        Successful_response_code 200
  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        Keep_Log            On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Labels              On
        Annotations         Off
    [FILTER]
        Name                  multiline
        Match                 kube.*
        multiline.key_content log
        multiline.parser      java,python
    [FILTER]
        Name       grep
        Match      kube.*
        Exclude    $kubernetes['namespace_name'] ^kube-system$
    [FILTER]
        Name       grep
        Match      kube.*
        Exclude    $kubernetes['namespace_name'] ^flux-system$
  outputs: |
    [OUTPUT]
        Name                 opentelemetry
        Match                *
        Host                 opentelemetry-collector-opentelemetry-collector.telemetry.svc
        Port                 4318
        Logs_uri             /v1/logs
        Traces_uri           /v1/traces
        Metrics_uri          /v1/metrics
        Log_response_payload False
        Tls                  Off
        Retry_Limit          False
