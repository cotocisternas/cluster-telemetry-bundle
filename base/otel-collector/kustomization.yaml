apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - otel-repo.yaml
  - otel-release.yaml
configMapGenerator:
  - name: opentelemetry-collector-values
    namespace: telemetry
    files:
      - values.yaml=values.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/component: processing
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: opentelemetry-collector-values
    app.kubernetes.io/part-of: cluster-telemetry-bundle
    reconcile.fluxcd.io/watch: Enabled
