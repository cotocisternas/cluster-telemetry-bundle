apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics
  namespace: telemetry
  labels:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: cluster-telemetry-bundle
    app.kubernetes.io/managed-by: flux
spec:
  interval: 1h
  timeout: 5m
  chart:
    spec:
      chart: victoria-metrics-single
      version: "0.33.0"
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: victoriametrics-values
      valuesKey: values.yaml
    - kind: ConfigMap
      name: victoriametrics-cluster-values
      valuesKey: values.yaml
      optional: true
