apiVersion: v1
kind: Service
metadata:
  name: vm-query
  namespace: telemetry
  labels:
    app.kubernetes.io/name: vm-query
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: cluster-telemetry-bundle
    app.kubernetes.io/managed-by: flux
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8428
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: victoria-metrics-single
    app.kubernetes.io/instance: victoriametrics
