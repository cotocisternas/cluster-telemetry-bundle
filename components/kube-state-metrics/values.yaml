fullnameOverride: kube-state-metrics

prometheusScrape: false

prometheus:
  monitor:
    enabled: true
    additionalLabels:
      telemetry.example.com/scrape: "true"
    http:
      interval: 30s
      scrapeTimeout: 10s

selfMonitor:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
