apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../cluster-us-east-1
components:
  - ../../components/prometheus-crd-scrape
configMapGenerator:
  - name: opentelemetry-collector-cluster-values
    namespace: telemetry
    behavior: replace
    files:
      - values.yaml=otel-values.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/component: processing
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: opentelemetry-collector-cluster-values
    app.kubernetes.io/part-of: cluster-telemetry-bundle
    reconcile.fluxcd.io/watch: Enabled
