apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-telemetry-bundle
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: cluster-telemetry-bundle
  path: ./base
  ignoreMissingComponents: false
  components:
    - components/prometheus-crd-scrape
